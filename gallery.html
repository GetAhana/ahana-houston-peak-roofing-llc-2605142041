<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./styles.css" />
  <title>Peak Roofing Houston Gallery | Houston, TX</title>
  <meta name="description" content="Gallery: Peak Roofing Houston storm repairs, metal roofing, replacements, gutters. Licensed residential projects in Houston." />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{--container-w:1100px;--p:#C2410C;--d:#0F1114;--l:#F5F6F8;--a:#F97316}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,sans-serif;background:var(--l);color:#111}
    header{position:fixed;top:0;left:0;right:0;z-index:10;background:var(--d);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;box-shadow:0 2px 20px rgba(0,0,0,.35)}
    header a{color:#fff;text-decoration:none}
    .logo{font-family:Syne,sans-serif;font-weight:800;font-size:1.5rem}
    .logo span{color:var(--a)}
    nav ul{display:flex;gap:1.25rem;list-style:none}
    nav a{color:rgba(255,255,255,.75);font-weight:800;font-size:.82rem;text-transform:uppercase;letter-spacing:.1em}
    nav a:hover{color:var(--a)}
    .btn{background:var(--p);padding:.5rem 1.1rem;border-radius:4px;font-family:Syne,sans-serif;font-weight:800}
    main{padding:120px 1.5rem 4rem}
    .container{max-width:var(--container-w);margin:0 auto;width:100%}
    .k{font-size:.75rem;font-weight:900;text-transform:uppercase;letter-spacing:.18em;color:var(--p);margin-bottom:.5rem}
    h1{font-family:Syne,sans-serif;font-weight:800;font-size:clamp(2.2rem,4.8vw,3.4rem);line-height:1.05}
    h1 span{color:var(--p)}
    p{margin-top:1rem;color:#4A4A4A;line-height:1.75;max-width:760px}
    .carousel{margin-top:2.25rem;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:14px;overflow:hidden}
    .track{display:flex;transition:transform .45s ease}
    .slide{min-width:100%;aspect-ratio:16/9;background:#111}
    .slide img{width:100%;height:100%;object-fit:cover;display:block}
    .nav{display:flex;justify-content:space-between;align-items:center;padding:.9rem 1rem;background:var(--l)}
    button{border:1px solid rgba(0,0,0,.12);background:#fff;border-radius:10px;padding:.55rem .9rem;font-weight:900;cursor:pointer}
    button:hover{border-color:var(--p)}
    .meta{font-size:.85rem;color:#666;font-weight:800}
    @media(max-width:640px){nav ul{display:none}}
  </style>
</head>
<body>
  <header>
    <a class="logo" href="index.html">Peak<span>.</span></a>
    <nav>
      <ul>
        <li><a href="services.html">Services</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="testimonials.html">Reviews</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="articles.html">Articles</a></li>
        <li><a href="service-area.html">Service Area</a></li>
      </ul>
    </nav>
    <a class="btn" href="tel:7135550199">Call Now</a>
  </header>

  <main>
    <div class="container">
      <div class="k">Gallery</div>
      <h1>Real Work in <span>Houston</span></h1>
      <p>See our recent roofing projects across Houston metro: storm repairs, full replacements, metal roofing, gutters, and more.</p>

      <div class="carousel" data-carousel>
        <div class="track" data-track>
          {{#each GALLERY_UP_TO_10}}
          <div class="slide"><img src="{{this.url}}" alt="{{this.alt}}"></div>
          {{/each}}
        </div>
        <div class="nav">
          <button type="button" data-prev>Prev</button>
          <div class="meta"><span data-index>1</span> / <span data-total>10</span></div>
          <button type="button" data-next>Next</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function(){
      const root = document.querySelector('[data-carousel]');
      if(!root) return;
      const track = root.querySelector('[data-track]');
      const slides = Array.from(track.children);
      const prev = root.querySelector('[data-prev]');
      const next = root.querySelector('[data-next]');
      const idxEl = root.querySelector('[data-index]');
      const totalEl = root.querySelector('[data-total]');
      let idx=0;
      if(!slides.length) return;
      totalEl.textContent = slides.length;
      function render(){ track.style.transform='translateX('+(-idx*100)+'%)'; idxEl.textContent=(idx+1); }
      prev.addEventListener('click',()=>{ idx=(idx-1+slides.length)%slides.length; render(); });
      next.addEventListener('click',()=>{ idx=(idx+1)%slides.length; render(); });
      render();
    })();
  </script>
  <script src="./main.js" defer></script>
</body>
</html>
